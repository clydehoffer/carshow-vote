<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cal State LA Car Show — Live Vote</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold: #FFCE00;
  --black: #0a0a0a;
  --dark: #111;
  --dark2: #1a1a1a;
  --dark3: #252525;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0f0f0;
  --text2: #777;
  --text3: #3a3a3a;
  --green: #30d158;
  --asphalt: #1a1a1a;
  --stripe: rgba(255,255,255,0.04);
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--black);
  color: var(--text);
  font-family: 'DM Sans', -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
}

.shell {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ── Header ── */
.header {
  background: var(--dark);
  border-bottom: 2px solid var(--gold);
  padding: 0 28px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px;
  letter-spacing: 0.06em;
  color: var(--gold);
  line-height: 1;
}
.header-meta { font-size: 11px; color: var(--text2); letter-spacing: 0.06em; text-transform: uppercase; }
.live-badge {
  display: flex; align-items: center; gap: 6px;
  background: var(--dark2); border: 1px solid var(--border2);
  border-radius: 100px; padding: 4px 12px;
  font-size: 11px; font-weight: 600; color: var(--text2); letter-spacing: 0.06em;
}
.live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green); box-shadow: 0 0 6px var(--green);
  animation: pulse 2s ease infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── Track area ── */
.track-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 16px 28px 12px;
  gap: 0;
  overflow: hidden;
}

/* ── Category row ── */
.cat-row {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 0;
  border-bottom: 1px solid var(--border);
  position: relative;
}
.cat-row:last-child { border-bottom: none; }

/* Category label */
.cat-label {
  width: 160px;
  flex-shrink: 0;
  padding-right: 16px;
}
.cat-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px;
  letter-spacing: 0.05em;
  color: var(--text2);
  line-height: 1.1;
  text-transform: uppercase;
}
.cat-votes {
  font-size: 10px;
  color: var(--text3);
  margin-top: 2px;
  letter-spacing: 0.04em;
}

/* Race lane */
.lane-wrap {
  flex: 1;
  position: relative;
  height: 100%;
  display: flex;
  align-items: center;
}

/* Asphalt background */
.asphalt {
  position: absolute;
  inset: 8px 40px 8px 0;
  background: var(--asphalt);
  border-radius: 6px;
  overflow: hidden;
}

/* Road dashes */
.asphalt::after {
  content: '';
  position: absolute;
  top: 50%; left: 0; right: 0; height: 1px;
  background: repeating-linear-gradient(to right, rgba(255,255,255,0.06) 0, rgba(255,255,255,0.06) 8px, transparent 8px, transparent 18px);
  transform: translateY(-50%);
}

/* Finish flag */
.finish {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  width: 20px; height: 20px;
  color: var(--text3);
}

/* Cars container — stacks multiple cars vertically in the lane */
.cars-in-lane {
  position: absolute;
  inset: 8px 40px 8px 0;
  display: flex;
  flex-direction: column;
  justify-content: space-around;
  padding: 3px 0;
  pointer-events: none;
}

.car-track {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
  max-height: 28px;
}

/* Bar */
.car-bar {
  position: absolute;
  left: 0;
  height: 70%;
  border-radius: 4px;
  background: var(--gold);
  transition: width 1s cubic-bezier(0.34, 1.1, 0.64, 1);
  min-width: 6px;
  opacity: 0.9;
}

/* Car icon on bar */
.car-icon {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  transition: left 1s cubic-bezier(0.34, 1.1, 0.64, 1);
  width: 18px; height: 18px;
  color: var(--gold);
  filter: drop-shadow(0 0 3px rgba(255,206,0,0.5));
}

/* Driver name label */
.driver-label {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 10px;
  font-weight: 500;
  color: rgba(255,255,255,0.5);
  white-space: nowrap;
  pointer-events: none;
  transition: left 1s cubic-bezier(0.34, 1.1, 0.64, 1);
}

/* Empty state */
.empty-lane {
  position: absolute;
  inset: 8px 40px 8px 0;
  display: flex;
  align-items: center;
  padding-left: 12px;
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.04em;
}

/* ── Mobile portrait ── */
@media (max-width: 700px) or (orientation: portrait) {
  .shell { overflow-y: auto; height: auto; min-height: 100vh; }
  .track-area { gap: 0; padding: 12px 16px 20px; overflow: visible; }
  .cat-row { flex-direction: column; align-items: flex-start; min-height: 140px; padding: 10px 0; }
  .cat-label { width: 100%; padding-right: 0; padding-bottom: 6px; }
  .cat-name { font-size: 13px; }
  .lane-wrap { width: 100%; min-height: 100px; }
  .asphalt, .cars-in-lane, .empty-lane { right: 32px; }
  .finish { right: 4px; }
  .header { height: 48px; padding: 0 16px; }
  .logo { font-size: 18px; }
}
</style>
</head>
<body>

<div class="shell">
  <header class="header">
    <div class="header-left">
      <div class="logo">Cal State LA Car Show 2025</div>
      <div class="header-meta">April 25 · Lot 5 · Live Vote</div>
    </div>
    <div class="live-badge">
      <div class="live-dot"></div>
      Live
    </div>
  </header>

  <div class="track-area" id="track"></div>
</div>

<script src="categories.js"></script>
<script>
const VOTES_API = "https://script.google.com/macros/s/AKfycbyubbrgZS0i23l1zyL7lKn4O5KjBW8bnfRG2EpQrp97PYtAdG6LkkBDqaryD1HrAAlH/exec";
const POLL_MS   = 10000;

const CAR_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 17H5a2 2 0 0 1-2-2v-4l2.5-5h11L19 11v4a2 2 0 0 1-2 2z"/><circle cx="7.5" cy="17.5" r="1.5"/><circle cx="16.5" cy="17.5" r="1.5"/><path d="M3 11h18"/></svg>`;
const FLAG_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>`;

// leaderboard[catId][carId] = { name, votes }
let board   = {};
let polling = false;

CATEGORIES.forEach(c => board[c.id] = {});

function build() {
  const track = document.getElementById("track");
  track.innerHTML = CATEGORIES.map(cat => `
    <div class="cat-row" id="row-${cat.id}">
      <div class="cat-label">
        <div class="cat-name">${cat.name}</div>
        <div class="cat-votes" id="votes-${cat.id}">No votes yet</div>
      </div>
      <div class="lane-wrap">
        <div class="asphalt"></div>
        <div class="finish">${FLAG_SVG}</div>
        <div class="cars-in-lane" id="lane-${cat.id}">
          <div class="empty-lane" id="empty-${cat.id}">Waiting for votes...</div>
        </div>
      </div>
    </div>
  `).join("");
}

function updateAll() {
  CATEGORIES.forEach(cat => {
    const cars   = Object.values(board[cat.id]).sort((a,b) => b.votes - a.votes);
    const total  = cars.reduce((s,c) => s + c.votes, 0);
    const max    = Math.max(1, ...cars.map(c => c.votes));
    const lane   = document.getElementById("lane-"+cat.id);
    const empty  = document.getElementById("empty-"+cat.id);
    const votesEl= document.getElementById("votes-"+cat.id);
    if (!lane) return;

    if (votesEl) votesEl.textContent = total > 0 ? `${total} vote${total!==1?"s":""}` : "No votes yet";

    if (cars.length === 0) {
      lane.innerHTML = `<div class="empty-lane">Waiting for votes...</div>`;
      return;
    }

    // Remove empty div
    lane.innerHTML = cars.map((car, i) => {
      const pct = Math.max(3, Math.round((car.votes / max) * 88));
      // Gold for leader, dimmer for rest
      const opacity = i === 0 ? "1" : i === 1 ? "0.65" : "0.4";
      return `
        <div class="car-track">
          <div class="car-bar" style="width:${pct}%;opacity:${opacity}"></div>
          <span class="car-icon" style="left:calc(${pct}% - 8px)">${CAR_SVG}</span>
          <span class="driver-label" style="left:calc(${pct}% + 14px)">${car.name} &nbsp;${car.votes}</span>
        </div>`;
    }).join("");
  });
}

async function fetchVotes() {
  if (polling) return;
  polling = true;
  try {
    const res  = await fetch(VOTES_API + "?t=" + Date.now());
    const data = await res.json();
    const rows = data.votes || [];
    if (rows.length === 0 && Object.values(board).every(b => Object.keys(b).length === 0)) { polling = false; return; }
    if (rows.length > 0) {
      CATEGORIES.forEach(c => board[c.id] = {});
      rows.forEach(({ catId, carId, carName }) => {
        if (!catId || !carId || !board[catId]) return;
        if (!board[catId][carId]) board[catId][carId] = { name: carName||carId, votes: 0 };
        board[catId][carId].votes++;
      });
    }
    updateAll();
  } catch(e) { console.warn("Poll failed", e); }
  polling = false;
}

build();
fetchVotes();
setInterval(fetchVotes, POLL_MS);
</script>
</body>
</html>

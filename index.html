<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cal State LA Car Show — Vote</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold: #FFCE00;
  --black: #0a0a0a;
  --dark: #111;
  --dark2: #1a1a1a;
  --dark3: #222;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #f0f0f0;
  --text2: #888;
  --text3: #444;
  --green: #30d158;
  --track: #161616;
  --asphalt: #1c1c1c;
}
html { scroll-behavior: smooth; }
body {
  background: var(--black);
  color: var(--text);
  font-family: 'DM Sans', -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
.site-header {
  background: var(--dark);
  border-bottom: 3px solid var(--gold);
  padding: 0 24px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-inner {
  max-width: 900px;
  margin: 0 auto;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.logo-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 0.06em;
  color: var(--gold);
}
.logo-sub {
  font-size: 10px;
  color: var(--text2);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 1px;
}
.live-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--dark2);
  border: 1px solid var(--border2);
  border-radius: 100px;
  padding: 5px 12px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  letter-spacing: 0.06em;
}
.live-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
  animation: pulse-dot 2s ease infinite;
}
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.35} }
.tabs-wrap {
  background: var(--dark);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
  position: sticky;
  top: 60px;
  z-index: 99;
}
.tabs-wrap::-webkit-scrollbar { display: none; }
.tabs {
  display: flex;
  max-width: 900px;
  margin: 0 auto;
  padding: 0 24px;
}
.tab {
  padding: 13px 18px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--text2);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: all 0.15s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--gold); border-bottom-color: var(--gold); }
.main {
  max-width: 900px;
  margin: 0 auto;
  padding: 28px 24px 80px;
}
.cat-view { display: none; }
.cat-view.active { display: block; }
.cat-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 44px;
  letter-spacing: 0.03em;
  color: var(--text);
  line-height: 1;
  margin-bottom: 4px;
}
.cat-meta { font-size: 12px; color: var(--text2); margin-bottom: 20px; }
.cat-meta span { color: var(--gold); font-weight: 600; }
.race-track {
  background: var(--track);
  border: 1px solid var(--border);
  border-radius: 18px;
  overflow: hidden;
}
.track-hdr {
  display: grid;
  grid-template-columns: 44px 1fr 72px;
  gap: 12px;
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
}
.lane {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
.lane:last-child { border-bottom: none; }
.lane:hover { background: rgba(255,255,255,0.02); }
.lane-top {
  display: grid;
  grid-template-columns: 44px 1fr 72px;
  gap: 12px;
  align-items: center;
  margin-bottom: 10px;
}
.rank-wrap { display: flex; align-items: center; justify-content: center; }
.rank-icon {
  width: 30px; height: 30px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.rank-icon svg { width: 14px; height: 14px; }
.rank-icon.gold   { background: rgba(255,206,0,0.15);   border: 1px solid rgba(255,206,0,0.3);   color: var(--gold); }
.rank-icon.silver { background: rgba(192,192,192,0.1);  border: 1px solid rgba(192,192,192,0.25); color: #c0c0c0; }
.rank-icon.bronze { background: rgba(205,127,50,0.1);   border: 1px solid rgba(205,127,50,0.25);  color: #cd7f32; }
.rank-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px; color: var(--text3);
  text-align: center; line-height: 1;
}
.lane-name    { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.2; }
.lane-vehicle { font-size: 11px; color: var(--text2); margin-top: 2px; }
.vote-count-badge {
  background: var(--dark3);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 6px 8px;
  text-align: center;
  min-width: 52px;
}
.vc-num   { font-size: 18px; font-weight: 700; line-height: 1; color: var(--text); }
.vc-label { font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); margin-top: 2px; }
.bar-wrap {
  position: relative;
  height: 26px;
  background: var(--asphalt);
  border-radius: 5px;
  overflow: visible;
  margin-left: 56px;
  margin-right: 90px;
}
.bar-wrap::before {
  content: '';
  position: absolute;
  top: 50%; left: 0; right: 0; height: 1px;
  background: repeating-linear-gradient(to right, rgba(255,255,255,0.07) 0, rgba(255,255,255,0.07) 10px, transparent 10px, transparent 20px);
  transform: translateY(-50%);
}
.finish-icon {
  position: absolute;
  right: -32px; top: 50%;
  transform: translateY(-50%);
  width: 20px; height: 20px;
  color: var(--text3);
}
.race-bar {
  height: 100%;
  border-radius: 5px;
  background: var(--gold);
  transition: width 0.9s cubic-bezier(0.34,1.1,0.64,1);
  min-width: 8px;
  position: relative;
}
.car-icon {
  position: absolute;
  right: -20px; top: 50%;
  transform: translateY(-50%);
  width: 20px; height: 20px;
  color: var(--gold);
  filter: drop-shadow(0 0 4px rgba(255,206,0,0.35));
}
.empty-cat {
  padding: 60px 20px;
  text-align: center;
  color: var(--text3);
  font-size: 13px;
}
.empty-cat svg { width: 36px; height: 36px; margin: 0 auto 12px; display: block; color: var(--text3); }
@media (max-width: 480px) {
  .cat-title { font-size: 32px; }
  .bar-wrap { margin-left: 48px; margin-right: 72px; }
  .main { padding: 20px 16px 80px; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div>
      <div class="logo-text">Cal State LA Car Show</div>
      <div class="logo-sub">Live Vote Board · April 25, 2025</div>
    </div>
    <div class="live-badge">
      <div class="live-dot"></div>
      Live
    </div>
  </div>
</header>

<div class="tabs-wrap"><div class="tabs" id="tabs"></div></div>
<main class="main" id="main"></main>

<script src="categories.js"></script>
<script>
const SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSlnJTTAJH88SxmWDt_2UByJ09HEpi0X4nneW6RU_YsCY1ITdeti2lzWlm9a08hrjGUfQSALLYWGDOc/pub?output=csv";
const POLL_MS   = 10000;

// leaderboard[catId][carId] = { name, plate, votes }
let leaderboard = {};
let activeTab   = CATEGORIES[0].id;
let polling     = false;
let initialized = false;

const SVG = {
  trophy: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 21h8M12 17v4M17 3H7l1 8a4 4 0 0 0 8 0l1-8z"/><path d="M7 3H4a1 1 0 0 0-1 1v1a4 4 0 0 0 4 4M17 3h3a1 1 0 0 1 1 1v1a4 4 0 0 1-4 4"/></svg>`,
  medal:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="15" r="5"/><path d="M8.5 8.5 8 3h8l-.5 5.5"/></svg>`,
  flag:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>`,
  car:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 17H5a2 2 0 0 1-2-2v-4l2.5-5h11L19 11v4a2 2 0 0 1-2 2z"/><circle cx="7.5" cy="17.5" r="1.5"/><circle cx="16.5" cy="17.5" r="1.5"/><path d="M3 11h18"/></svg>`,
  empty:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="8" y1="12" x2="16" y2="12"/></svg>`,
};

function init() {
  CATEGORIES.forEach(c => { leaderboard[c.id] = {}; });
  buildTabs();
  buildAll();
  setTab(activeTab);
  fetchVotes();
  setInterval(fetchVotes, POLL_MS);
}

function buildTabs() {
  document.getElementById("tabs").innerHTML = CATEGORIES.map(c =>
    `<div class="tab" id="tab-${c.id}" onclick="setTab('${c.id}')">${c.name}</div>`
  ).join("");
}

function setTab(id) {
  activeTab = id;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".cat-view").forEach(v => v.classList.remove("active"));
  const tab  = document.getElementById("tab-"+id);
  const view = document.getElementById("view-"+id);
  if (tab)  { tab.classList.add("active"); tab.scrollIntoView({behavior:"smooth",block:"nearest",inline:"center"}); }
  if (view) view.classList.add("active");
}

function buildAll() {
  document.getElementById("main").innerHTML = CATEGORIES.map(renderCat).join("");
}

function renderCat(cat) {
  const cars   = getSorted(cat.id);
  const total  = cars.reduce((s, c) => s + c.votes, 0);
  const max    = Math.max(1, ...cars.map(c => c.votes));
  const lanes  = cars.length === 0
    ? `<div class="empty-cat">${SVG.empty}<div>No votes yet — be the first!</div></div>`
    : cars.map((car, i) => renderLane(car, i, max)).join("");
  return `
    <div class="cat-view" id="view-${cat.id}">
      <div class="cat-title">${cat.name}</div>
      <div class="cat-meta" id="meta-${cat.id}">${cars.length} cars &nbsp;·&nbsp; <span>${total}</span> total votes</div>
      <div class="race-track">
        <div class="track-hdr"><div>Rank</div><div>Driver</div><div style="text-align:right">Votes</div></div>
        <div id="lanes-${cat.id}">${lanes}</div>
      </div>
    </div>`;
}

function renderLane(car, i, max) {
  const pct = max > 0 ? Math.max(5, Math.round((car.votes / max) * 90)) : 5;
  let rankHTML;
  if      (i === 0) rankHTML = `<div class="rank-icon gold">${SVG.trophy}</div>`;
  else if (i === 1) rankHTML = `<div class="rank-icon silver">${SVG.medal}</div>`;
  else if (i === 2) rankHTML = `<div class="rank-icon bronze">${SVG.medal}</div>`;
  else              rankHTML = `<div class="rank-num">${i+1}</div>`;

  return `
    <div class="lane">
      <div class="lane-top">
        <div class="rank-wrap">${rankHTML}</div>
        <div>
          <div class="lane-name">${car.name}</div>
          <div class="lane-vehicle">${car.plate}</div>
        </div>
        <div class="vote-count-badge">
          <div class="vc-num">${car.votes}</div>
          <div class="vc-label">votes</div>
        </div>
      </div>
      <div class="bar-wrap">
        <div class="race-bar" style="width:${pct}%">
          <span class="car-icon">${SVG.car}</span>
        </div>
        <span class="finish-icon">${SVG.flag}</span>
      </div>
    </div>`;
}

function getSorted(catId) {
  const cats = leaderboard[catId] || {};
  return Object.values(cats).sort((a, b) => b.votes - a.votes);
}

function updateCat(catId) {
  const cat    = CATEGORIES.find(c => c.id === catId);
  if (!cat) return;
  const cars   = getSorted(catId);
  const total  = cars.reduce((s, c) => s + c.votes, 0);
  const max    = Math.max(1, ...cars.map(c => c.votes));

  const metaEl  = document.getElementById("meta-"+catId);
  const lanesEl = document.getElementById("lanes-"+catId);
  if (metaEl)  metaEl.innerHTML  = `${cars.length} cars &nbsp;·&nbsp; <span>${total}</span> total votes`;
  if (lanesEl) lanesEl.innerHTML = cars.length === 0
    ? `<div class="empty-cat">${SVG.empty}<div>No votes yet — be the first!</div></div>`
    : cars.map((car, i) => renderLane(car, i, max)).join("");
}

async function fetchVotes() {
  if (polling) return;
  polling = true;
  try {
    const res  = await fetch(SHEET_CSV + "&t=" + Date.now());
    const text = await res.text();
    const rows = text.trim().split("\n").slice(1);

    // Reset leaderboard
    CATEGORIES.forEach(c => { leaderboard[c.id] = {}; });

    rows.forEach(row => {
      // CSV columns: Timestamp, Category ID, Car ID (plate), Car Name
      const cols   = row.split(",");
      const catId  = (cols[1] || "").trim().replace(/^"|"$/g, "");
      const carId  = (cols[2] || "").trim().replace(/^"|"$/g, "");
      const carName= (cols[3] || "").trim().replace(/^"|"$/g, "");

      if (!catId || !carId) return;
      if (!leaderboard[catId]) return; // unknown category

      if (!leaderboard[catId][carId]) {
        leaderboard[catId][carId] = { name: carName || carId, plate: carId, votes: 0 };
      }
      leaderboard[catId][carId].votes++;
    });

    CATEGORIES.forEach(c => updateCat(c.id));
  } catch(e) { console.warn("Poll failed", e); }
  polling = false;
}

init();
</script>
</body>
</html>

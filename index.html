<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cal State LA Car Show — Vote</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold: #FFCE00;
  --gold2: #e6b800;
  --black: #0a0a0a;
  --dark: #111;
  --dark2: #1a1a1a;
  --dark3: #222;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #f0f0f0;
  --text2: #888;
  --text3: #444;
  --green: #30d158;
  --track: #161616;
  --asphalt: #1c1c1c;
}
html { scroll-behavior: smooth; }
body {
  background: var(--black);
  color: var(--text);
  font-family: 'DM Sans', -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
.site-header {
  background: var(--dark);
  border-bottom: 3px solid var(--gold);
  padding: 0 24px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-inner {
  max-width: 900px;
  margin: 0 auto;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.logo-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 0.06em;
  color: var(--gold);
}
.logo-sub {
  font-size: 10px;
  color: var(--text2);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 1px;
}
.live-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--dark2);
  border: 1px solid var(--border2);
  border-radius: 100px;
  padding: 5px 12px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  letter-spacing: 0.06em;
}
.live-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
  animation: pulse-dot 2s ease infinite;
}
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.35} }
.tabs-wrap {
  background: var(--dark);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
  position: sticky;
  top: 60px;
  z-index: 99;
}
.tabs-wrap::-webkit-scrollbar { display: none; }
.tabs {
  display: flex;
  max-width: 900px;
  margin: 0 auto;
  padding: 0 24px;
}
.tab {
  padding: 13px 18px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--text2);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: all 0.15s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--gold); border-bottom-color: var(--gold); }
.main {
  max-width: 900px;
  margin: 0 auto;
  padding: 28px 24px 80px;
}
.cat-view { display: none; }
.cat-view.active { display: block; }
.cat-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 44px;
  letter-spacing: 0.03em;
  color: var(--text);
  line-height: 1;
  margin-bottom: 4px;
}
.cat-meta { font-size: 12px; color: var(--text2); margin-bottom: 20px; }
.cat-meta span { color: var(--gold); font-weight: 600; }
.race-track {
  background: var(--track);
  border: 1px solid var(--border);
  border-radius: 18px;
  overflow: hidden;
}
.track-hdr {
  display: grid;
  grid-template-columns: 44px 1fr 80px;
  gap: 12px;
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
}
.lane {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
.lane:last-child { border-bottom: none; }
.lane:hover { background: rgba(255,255,255,0.02); }
.lane-top {
  display: grid;
  grid-template-columns: 44px 1fr 80px;
  gap: 12px;
  align-items: center;
  margin-bottom: 10px;
}
.rank-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
}
.rank-icon {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.rank-icon svg { width: 14px; height: 14px; }
.rank-icon.gold { background: rgba(255,206,0,0.15); border: 1px solid rgba(255,206,0,0.3); color: var(--gold); }
.rank-icon.silver { background: rgba(192,192,192,0.1); border: 1px solid rgba(192,192,192,0.25); color: #c0c0c0; }
.rank-icon.bronze { background: rgba(205,127,50,0.1); border: 1px solid rgba(205,127,50,0.25); color: #cd7f32; }
.rank-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  color: var(--text3);
  text-align: center;
  line-height: 1;
}
.lane-name { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.2; }
.lane-vehicle { font-size: 11px; color: var(--text2); margin-top: 2px; }
.vote-btn {
  background: var(--dark3);
  border: 1px solid var(--border2);
  border-radius: 10px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 600;
  padding: 8px 6px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  width: 100%;
  -webkit-tap-highlight-color: transparent;
}
.vote-btn:hover:not(.voted):not(.submitting) {
  background: rgba(255,206,0,0.12);
  border-color: rgba(255,206,0,0.35);
  color: var(--gold);
  transform: translateY(-1px);
}
.vote-btn.voted {
  background: rgba(255,206,0,0.1);
  border-color: rgba(255,206,0,0.3);
  color: var(--gold);
}
.vote-btn.submitting { opacity: 0.5; cursor: default; }
.vote-count { font-size: 18px; font-weight: 700; line-height: 1; }
.vote-count svg { width: 16px; height: 16px; }
.vote-label { font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.7; }
.bar-wrap {
  position: relative;
  height: 26px;
  background: var(--asphalt);
  border-radius: 5px;
  overflow: visible;
  margin-left: 56px;
  margin-right: 90px;
}
.bar-wrap::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 0; right: 0;
  height: 1px;
  background: repeating-linear-gradient(to right, rgba(255,255,255,0.07) 0, rgba(255,255,255,0.07) 10px, transparent 10px, transparent 20px);
  transform: translateY(-50%);
}
.finish-icon {
  position: absolute;
  right: -32px;
  top: 50%;
  transform: translateY(-50%);
  width: 20px;
  height: 20px;
  color: var(--text3);
}
.race-bar {
  height: 100%;
  border-radius: 5px;
  background: var(--gold);
  transition: width 0.9s cubic-bezier(0.34, 1.1, 0.64, 1);
  min-width: 8px;
  position: relative;
}
.car-icon {
  position: absolute;
  right: -20px;
  top: 50%;
  transform: translateY(-50%);
  width: 20px;
  height: 20px;
  color: var(--gold);
  filter: drop-shadow(0 0 4px rgba(255,206,0,0.35));
}
.empty-cat {
  padding: 60px 20px;
  text-align: center;
  color: var(--text3);
  font-size: 13px;
}
.empty-cat svg { width: 36px; height: 36px; margin: 0 auto 12px; display: block; }
#toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(70px);
  background: var(--dark2);
  border: 1px solid rgba(48,209,88,0.3);
  border-radius: 100px;
  padding: 10px 20px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 999;
  white-space: nowrap;
  pointer-events: none;
  display: flex;
  align-items: center;
  gap: 8px;
}
#toast.show { transform: translateX(-50%) translateY(0); }
@media (max-width: 480px) {
  .cat-title { font-size: 32px; }
  .bar-wrap { margin-left: 48px; margin-right: 72px; }
  .main { padding: 20px 16px 80px; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div>
      <div class="logo-text">Cal State LA Car Show</div>
      <div class="logo-sub">People's Vote · April 25, 2025</div>
    </div>
    <div class="live-badge">
      <div class="live-dot"></div>
      Live
    </div>
  </div>
</header>

<div class="tabs-wrap"><div class="tabs" id="tabs"></div></div>
<main class="main" id="main"></main>
<div id="toast"></div>

<script src="categories.js"></script>
<script>
const FORM_URL   = "https://docs.google.com/forms/d/e/1FAIpQLScCJ1GNmSBalsLmqU-ohr6L1IaAtmtKXbsNCluR3qHfQS0OhQ/formResponse";
const SHEET_CSV  = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSlnJTTAJH88SxmWDt_2UByJ09HEpi0X4nneW6RU_YsCY1ITdeti2lzWlm9a08hrjGUfQSALLYWGDOc/pub?output=csv";
const ENTRY_CAT  = "entry.2095184271";
const ENTRY_CAR  = "entry.1446723408";
const ENTRY_NAME = "entry.1632049593";
const POLL_MS    = 10000;

const SVG = {
  trophy: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 21h8M12 17v4M17 3H7l1 8a4 4 0 0 0 8 0 1-8z"/><path d="M7 3H4a1 1 0 0 0-1 1v1a4 4 0 0 0 4 4M17 3h3a1 1 0 0 1 1 1v1a4 4 0 0 1-4 4"/></svg>`,
  medal:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="15" r="5"/><path d="M8.5 8.5 8 3h8l-.5 5.5"/></svg>`,
  check:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
  flag:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>`,
  car:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 17H5a2 2 0 0 1-2-2v-4l2.5-5h11L19 11v4a2 2 0 0 1-2 2z"/><circle cx="7.5" cy="17.5" r="1.5"/><circle cx="16.5" cy="17.5" r="1.5"/><path d="M3 11h18"/></svg>`,
  empty:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="8" y1="12" x2="16" y2="12"/></svg>`,
};

let liveCounts = {};
let voted = JSON.parse(localStorage.getItem("cs_voted_v3") || "{}");
let activeTab = CATEGORIES[0].id;
let polling = false;

function init() {
  CATEGORIES.forEach(cat => {
    if (!liveCounts[cat.id]) liveCounts[cat.id] = {};
    if (!voted[cat.id])      voted[cat.id]      = {};
    cat.cars.forEach(car => {
      if (!liveCounts[cat.id][car.id]) liveCounts[cat.id][car.id] = 0;
    });
  });
  const params = new URLSearchParams(window.location.search);
  const cp = params.get("cat");
  if (cp && CATEGORIES.find(c => c.id === cp)) activeTab = cp;
  buildTabs(); buildAll(); setTab(activeTab);
  fetchVotes();
  setInterval(fetchVotes, POLL_MS);
}

function buildTabs() {
  document.getElementById("tabs").innerHTML = CATEGORIES.map(c =>
    `<div class="tab" id="tab-${c.id}" onclick="setTab('${c.id}')">${c.name}</div>`
  ).join("");
}

function setTab(id) {
  activeTab = id;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".cat-view").forEach(v => v.classList.remove("active"));
  const tab = document.getElementById("tab-"+id);
  const view = document.getElementById("view-"+id);
  if (tab) { tab.classList.add("active"); tab.scrollIntoView({behavior:"smooth",block:"nearest",inline:"center"}); }
  if (view) view.classList.add("active");
}

function buildAll() {
  document.getElementById("main").innerHTML = CATEGORIES.map(renderCat).join("");
}

function renderCat(cat) {
  const sorted = getSorted(cat);
  const total  = sorted.reduce((s, c) => s + getV(cat.id, c.id), 0);
  const max    = Math.max(1, ...sorted.map(c => getV(cat.id, c.id)));
  const lanes  = sorted.length === 0
    ? `<div class="empty-cat">${SVG.empty}<div>No cars assigned yet</div></div>`
    : sorted.map((car, i) => renderLane(cat, car, i, max)).join("");
  return `<div class="cat-view" id="view-${cat.id}">
    <div class="cat-title">${cat.name}</div>
    <div class="cat-meta">${sorted.length} cars &nbsp;·&nbsp; <span id="total-${cat.id}">${total}</span> total votes</div>
    <div class="race-track">
      <div class="track-hdr"><div>Rank</div><div>Driver</div><div style="text-align:right">Votes</div></div>
      <div id="lanes-${cat.id}">${lanes}</div>
    </div>
  </div>`;
}

function renderLane(cat, car, i, max) {
  const count = getV(cat.id, car.id);
  const hv    = voted[cat.id] && voted[cat.id][car.id];
  const pct   = max > 0 ? Math.max(5, Math.round((count / max) * 90)) : 5;

  let rankHTML;
  if      (i === 0) rankHTML = `<div class="rank-icon gold">${SVG.trophy}</div>`;
  else if (i === 1) rankHTML = `<div class="rank-icon silver">${SVG.medal}</div>`;
  else if (i === 2) rankHTML = `<div class="rank-icon bronze">${SVG.medal}</div>`;
  else              rankHTML = `<div class="rank-num">${i+1}</div>`;

  return `<div class="lane">
    <div class="lane-top">
      <div class="rank-wrap">${rankHTML}</div>
      <div>
        <div class="lane-name">${car.name}</div>
        <div class="lane-vehicle">${car.vehicle}</div>
      </div>
      <button class="vote-btn ${hv?"voted":""}"
              id="vbtn-${cat.id}-${car.id}"
              onclick="castVote('${cat.id}','${car.id}','${car.name.replace(/'/g,"\\'")}')">
        <span class="vote-count">${hv ? SVG.check : count}</span>
        <span class="vote-label">${hv ? "Voted" : "Vote"}</span>
      </button>
    </div>
    <div class="bar-wrap">
      <div class="race-bar" id="bar-${cat.id}-${car.id}" style="width:${pct}%">
        <span class="car-icon">${SVG.car}</span>
      </div>
      <span class="finish-icon">${SVG.flag}</span>
    </div>
  </div>`;
}

function getSorted(cat) {
  return [...cat.cars].sort((a,b) => getV(cat.id,b.id) - getV(cat.id,a.id));
}

function getV(catId, carId) {
  return (liveCounts[catId] && liveCounts[catId][carId]) || 0;
}

function castVote(catId, carId, carName) {
  if (voted[catId] && voted[catId][carId]) return;
  const btn = document.getElementById(`vbtn-${catId}-${carId}`);
  if (!btn || btn.classList.contains("submitting")) return;
  btn.classList.add("submitting");

  if (!liveCounts[catId]) liveCounts[catId] = {};
  liveCounts[catId][carId] = (liveCounts[catId][carId] || 0) + 1;
  if (!voted[catId]) voted[catId] = {};
  voted[catId][carId] = true;
  localStorage.setItem("cs_voted_v3", JSON.stringify(voted));

  updateCat(catId);
  showToast("Vote submitted for " + carName);

  const form = document.createElement("form");
  form.method = "POST"; form.action = FORM_URL; form.target = "vi"; form.style.display = "none";
  [[ENTRY_CAT,catId],[ENTRY_CAR,carId],[ENTRY_NAME,carName]].forEach(([k,v]) => {
    const i = document.createElement("input"); i.type="hidden"; i.name=k; i.value=v; form.appendChild(i);
  });
  let iframe = document.getElementById("vi");
  if (!iframe) { iframe=document.createElement("iframe"); iframe.name="vi"; iframe.id="vi"; iframe.style.display="none"; document.body.appendChild(iframe); }
  document.body.appendChild(form); form.submit();
  setTimeout(()=>document.body.removeChild(form), 2000);
}

function updateCat(catId) {
  const cat = CATEGORIES.find(c => c.id === catId);
  if (!cat) return;
  const sorted = getSorted(cat);
  const max    = Math.max(1, ...sorted.map(c => getV(catId, c.id)));
  const total  = sorted.reduce((s,c) => s + getV(catId,c.id), 0);
  const totalEl = document.getElementById("total-"+catId);
  if (totalEl) totalEl.textContent = total;
  const lanesEl = document.getElementById("lanes-"+catId);
  if (lanesEl) lanesEl.innerHTML = sorted.map((car,i) => renderLane(cat,car,i,max)).join("");
}

async function fetchVotes() {
  if (polling) return;
  polling = true;
  try {
    const res  = await fetch(SHEET_CSV + "&t=" + Date.now());
    const text = await res.text();
    const rows = text.trim().split("\n").slice(1);
    CATEGORIES.forEach(cat => { liveCounts[cat.id] = {}; });
    rows.forEach(row => {
      const cols  = row.split(",");
      const catId = (cols[1]||"").trim().replace(/^"|"$/g,"");
      const carId = (cols[2]||"").trim().replace(/^"|"$/g,"");
      if (catId && carId) {
        if (!liveCounts[catId]) liveCounts[catId] = {};
        liveCounts[catId][carId] = (liveCounts[catId][carId]||0) + 1;
      }
    });
    CATEGORIES.forEach(cat => updateCat(cat.id));
  } catch(e) { console.warn("Poll failed", e); }
  polling = false;
}

let tt;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#30d158" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>${msg}`;
  t.classList.add("show");
  clearTimeout(tt);
  tt = setTimeout(()=>t.classList.remove("show"), 2800);
}

init();
</script>
</body>
</html>
